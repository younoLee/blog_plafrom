# 백엔드 린터 설정. 실제 문제(안 쓰는 import·변수 F, import 정렬 I, 현대화 UP, 버그 B)에 집중.
line-length = 100
target-version = "py312"

# alembic은 도구가 생성/관리하는 보일러플레이트(env.py의 늦은 import 등) → 린트 제외
exclude = ["alembic"]

[lint]
# S(bandit)는 전체를 켜면 오탐이 쏟아져(테스트의 assert=S101 등) 규칙을 개별 선택한다.
# 목적은 '지금 있는 문제 찾기'가 아니라 회귀 방지 — 2026-07-20 점검에서 전부 깨끗한 걸
# 확인했고, 나중에 누가 취약 패턴을 넣으면 CI가 잡게 하려는 그물이다.
#   S608 SQL 문자열 보간 (지금 0건. 검색·목록이 전부 바인딩 파라미터인 상태를 고정)
#   S113 timeout 없는 requests (워커 스레드가 무한정 묶이는 DoS — 실제로 겪어서 막은 적 있음)
#   S501 verify=False (TLS 검증 끄기)
#   S324 md5/sha1 (약한 해시)
#   S307 eval
# 5개 다 '일부러 위반 코드를 만들어 잡히는지' 확인하고 켰다(켜기만 하고 안 잡히면 무의미).
select = ["E", "F", "W", "B", "I", "UP", "S608", "S113", "S501", "S324", "S307"]
ignore = [
    "E501",  # 줄길이 — 긴 한글 주석 많아 노이즈
    "B008",  # FastAPI의 Depends()를 기본값에 두는 건 프레임워크 관용구(오탐)
    "B904",  # except 안 HTTPException 재던지기 = 내부오류→클라이언트 응답 변환(의도된 패턴)
]

[lint.per-file-ignores]
# conftest는 앱 import '전에' 환경변수를 세팅하는 게 핵심이라 E402(최상단 import)가 의도된 위반.
"tests/conftest.py" = ["E402"]
