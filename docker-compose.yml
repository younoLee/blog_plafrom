services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 백엔드가 'DB 준비 완료' 후에 뜨도록 상태 체크
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blog"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 로컬 메일 캐처: 보낸 메일을 실제로 발송하지 않고 잡아서 웹 UI로 보여줌
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"  # SMTP (앱이 메일 보내는 포트)
      - "8025:8025"  # 웹 UI (보낸 메일 확인: http://localhost:8025)

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    # 컨테이너 안에선 localhost가 아니라 서비스 이름으로 접속 (db, mailpit)
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/blog
      # 로컬 개발용 키 (비밀 아님). 프로드는 .env에 강력한 임의값 사용.
      SECRET_KEY: local-dev-secret-key-not-for-production
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      # AI 키: 값이 아니라 '참조'만 둠. 실제 값은 compose 파일 옆 .env(gitignore됨)에서 치환.
      # .env에 없으면 빈 값 → 라우터가 503으로 안내(서버는 정상 기동).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # BYOK(사용자 GPT/Gemini 키) 암호화용. .env의 LLM_ENCRYPTION_KEY 치환.
      LLM_ENCRYPTION_KEY: ${LLM_ENCRYPTION_KEY:-}
    depends_on:
      db:
        condition: service_healthy   # DB 준비될 때까지 대기
      mailpit:
        condition: service_started
    volumes:
      - ./backend:/app               # 코드 수정 즉시 반영(개발용)
    # 시작 시 마이그레이션 자동 적용 후 서버 기동
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      # start_period 동안에는 실패를 세지 않는다. start_interval을 같이 주면 그 구간에서
      # 5초마다 찔러 **성공하는 순간 바로 healthy**가 되므로, start_period를 넉넉히 잡아도
      # 손해가 없다. 이게 없으면 "빨리 healthy"와 "늦게 실패 판정"을 한 노브로 맞바꾸게 된다.
      # (빈 DB로 부팅하는 재해 복구 때는 마이그레이션 27개 + GIN 인덱스가 60초를 넘길 수 있다)
      start_period: 120s
      start_interval: 5s

  frontend:
    build: ./frontend
    ports:
      - "5173:80"          # 호스트 5173 → nginx 80 (CORS origin 유지)
    depends_on:
      # 조건 없는 depends_on은 '컨테이너가 생성됐다'까지만 기다린다 → nginx가 백엔드보다
      # 먼저 떠서 첫 요청이 502가 난다. 운영 compose엔 frontend가 없으므로(프론트는 S3)
      # **헬스체크의 실제 소비자는 여기뿐이다.**
      backend:
        condition: service_healthy

volumes:
  postgres_data:
