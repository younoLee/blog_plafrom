name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC 토큰 발급(AWS 역할 assume)에 필수
      contents: read  # checkout용 최소 권한
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: 빌드
        working-directory: frontend
        env:
          VITE_API_BASE: https://d2j66m9udyg9yq.cloudfront.net/api
        run: npm run build

      - name: AWS 자격증명 (OIDC 역할 assume — 장기 키 없음)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::181568979775:role/github-actions-blog-deploy
          aws-region: ap-northeast-2

      - name: S3 업로드
        working-directory: frontend
        # uploads/* 는 사용자가 올린 이미지 → --delete가 지우지 않게 제외 (같은 버킷 공유)
        run: aws s3 sync dist/ s3://blogplafromops --delete --exclude "uploads/*"

      - name: CloudFront 캐시 무효화
        run: aws cloudfront create-invalidation --distribution-id E1438IL9CSVBS4 --paths "/*"
