# PR·push마다 도는 검증 게이트. deploy.yml(배포)과 분리 — 이건 '망가졌나'를 본다.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    # 테스트는 실제 Postgres 대상(앱이 ARRAY·pg_trgm에 의존 → SQLite 불가).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blog_test
      SECRET_KEY: ci-secret-key-0123456789abcdef
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: 의존성 설치
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: pytest
        working-directory: backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    # 유닛테스트(vitest) + tsc·빌드 통과를 게이트로.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 의존성 설치
        working-directory: frontend
        run: npm ci
      - name: 유닛테스트(vitest)
        working-directory: frontend
        run: npm test
      - name: 빌드(타입체크 포함)
        working-directory: frontend
        run: npm run build
