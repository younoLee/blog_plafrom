# 프로덕션(EC2) 스택. EC2 ~/blog/ 에 이 파일이 있고, .env(시크릿)는 깃 미포함.
# DB는 RDS가 아니라 이 compose의 db 컨테이너(pgdata 볼륨=EBS에 영구 저장).
# db 포트는 호스트에 노출하지 않는다 — backend가 compose 네트워크로 db:5432에 접속.
# 업로드 이미지는 **S3**(blogplafromops/uploads/)에 저장된다 — 2026-06-26 이전.
# 아래 uploads 볼륨은 남아 있는 폴백이며 운영 트래픽은 타지 않는다.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      # 비번은 compose가 같은 폴더 .env의 DB_PASSWORD로 치환(컨테이너 내부 전용, 인터넷 비노출).
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    # backend가 'DB 준비 완료' 후에 뜨도록 상태 체크
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    # 헬스체크가 30초마다 액세스 로그를 남긴다(하루 약 2,880줄). json-file 기본은
    # 무제한이고 이 디스크는 pgdata와 같은 EBS라, 회전을 안 걸면 DB와 로그가 같이 찬다.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # 폴백 겸 StaticFiles 마운트가 요구하는 폴더. 실제 이미지는 S3에 있다
    # (여기를 '이미지의 집'으로 읽으면 안 된다 — 2026-07-22에 이 주석 때문에 오판했다).
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy   # DB 준비될 때까지 대기
    # 백엔드에도 상태 체크. db에는 있는데 여기엔 없어서, 프로세스는 살아 있는데
    # 응답만 못 하는 상태를 `docker compose ps`로도 알 수 없었다.
    #
    # ⚠️ 오해 금지: 이건 **가시성**이지 자동 복구가 아니다. plain Compose는
    # unhealthy를 이유로 재시작하지 않는다(그건 Swarm/ECS의 몫). 실제 복구는
    # 아직 사람이 하고, 감지는 scripts/watch.sh가 바깥에서 한다.
    # ECS로 옮길 때 이 정의가 그대로 태스크 헬스체크가 된다.
    #
    # curl은 python:3.12-slim에 없다 → 표준 라이브러리로 때린다.
    # 경로는 /api/health다. /health는 404이므로 그걸 쓰면 100% 실패한다.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      # start_period 동안에는 실패를 세지 않는다. start_interval을 같이 주면 그 구간에서
      # 5초마다 찔러 **성공하는 순간 바로 healthy**가 되므로, start_period를 넉넉히 잡아도
      # 손해가 없다. 이게 없으면 "빨리 healthy"와 "늦게 실패 판정"을 한 노브로 맞바꾸게 된다.
      # (빈 DB로 부팅하는 재해 복구 때는 마이그레이션 27개 + GIN 인덱스가 60초를 넘길 수 있다)
      start_period: 120s
      start_interval: 5s
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
